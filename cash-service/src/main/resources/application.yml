server:
  port: 8082

spring:
  application:
    name: cash-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info

services:
  accounts-service:
    url: http://localhost:8081
  blocker-service:
    url: http://localhost:8085